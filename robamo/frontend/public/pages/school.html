<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ROBAMO — School Panel</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{--p1:#3B0764;--p2:#6D28D9;--p3:#8B5CF6;--p5:#EDE9FE;--acc:#F59E0B;--dark:#0D0118;--dark2:#1A0533;--text:#1C1C2E;--muted:#64748B;--white:#fff;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:#f1f5f9;color:var(--text);}
.login-page{min-height:100vh;background:var(--dark);display:flex;align-items:center;justify-content:center;}
.login-box{background:rgba(255,255,255,.05);border:1px solid rgba(139,92,246,.25);border-radius:24px;padding:3rem;width:100%;max-width:440px;text-align:center;}
.login-box .logo{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;color:#fff;letter-spacing:-1px;margin-bottom:.3rem;}
.login-box .logo span{color:var(--acc);}
.login-box p{color:rgba(255,255,255,.45);font-size:.9rem;margin-bottom:1.5rem;}
.tabs{display:flex;gap:.5rem;margin-bottom:1.5rem;background:rgba(255,255,255,.06);border-radius:50px;padding:.25rem;}
.tab-btn{flex:1;padding:.55rem;border:none;border-radius:50px;font-family:'DM Sans',sans-serif;font-size:.88rem;cursor:pointer;background:none;color:rgba(255,255,255,.5);transition:all .2s;}
.tab-btn.active{background:var(--p2);color:#fff;font-weight:600;}
.form-group{margin-bottom:1rem;text-align:left;}
.form-group label{display:block;font-size:.82rem;color:rgba(255,255,255,.6);margin-bottom:.4rem;}
.form-group input{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(139,92,246,.25);border-radius:10px;padding:.75rem 1rem;color:#fff;font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none;}
.form-group input:focus{border-color:var(--p3);}
.login-btn{width:100%;background:linear-gradient(135deg,var(--p2),var(--p3));color:#fff;border:none;padding:.85rem;border-radius:50px;font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;margin-top:.5rem;}
.login-btn:disabled{opacity:.6;cursor:not-allowed;}
.login-error{color:#f87171;font-size:.82rem;margin-top:.75rem;}
.login-success{color:#4ade80;font-size:.82rem;margin-top:.75rem;}
.dashboard{display:none;}
.sidebar{width:240px;background:var(--dark2);min-height:100vh;position:fixed;top:0;left:0;padding:1.5rem 0;border-right:1px solid rgba(139,92,246,.12);}
.sidebar-logo{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;color:#fff;padding:0 1.5rem;margin-bottom:.3rem;}
.sidebar-logo span{color:var(--acc);}
.sidebar-sub{font-size:.75rem;color:rgba(255,255,255,.3);padding:0 1.5rem;margin-bottom:2rem;}
.nav-item{display:flex;align-items:center;gap:.8rem;padding:.7rem 1.5rem;color:rgba(255,255,255,.5);font-size:.88rem;cursor:pointer;transition:all .2s;border-left:3px solid transparent;}
.nav-item:hover,.nav-item.active{color:#fff;background:rgba(139,92,246,.12);border-left-color:var(--p3);}
.main-content{margin-left:240px;padding:2rem;}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;}
.top-bar h1{font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800;color:var(--text);}
.school-badge{background:var(--p5);color:var(--p2);font-size:.8rem;padding:.3rem .8rem;border-radius:50px;font-weight:600;}
.logout-btn{background:none;border:1.5px solid #e2e8f0;color:var(--muted);padding:.45rem 1rem;border-radius:50px;font-family:'DM Sans',sans-serif;font-size:.83rem;cursor:pointer;transition:all .2s;}
.logout-btn:hover{border-color:#f87171;color:#f87171;}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1.2rem;margin-bottom:2rem;}
.stat-card{background:#fff;border-radius:16px;padding:1.4rem;border:1px solid #e2e8f0;display:flex;align-items:center;gap:1rem;}
.stat-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;}
.stat-icon.purple{background:var(--p5);}
.stat-icon.amber{background:#fffbeb;}
.stat-icon.green{background:#f0fdf4;}
.stat-value{font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:800;color:var(--text);line-height:1;}
.stat-label{font-size:.78rem;color:var(--muted);margin-top:.2rem;}
.section{display:none;}
.section.active{display:block;}
.card{background:#fff;border-radius:16px;border:1px solid #e2e8f0;overflow:hidden;margin-bottom:1.5rem;}
.card-header{padding:1.2rem 1.5rem;border-bottom:1px solid #e2e8f0;display:flex;justify-content:space-between;align-items:center;}
.card-title{font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;}
.search-box{padding:.5rem .9rem;border:1.5px solid #e2e8f0;border-radius:50px;font-family:'DM Sans',sans-serif;font-size:.85rem;outline:none;width:220px;}
.search-box:focus{border-color:var(--p3);}
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
th{background:#f8fafc;padding:.85rem 1rem;text-align:left;font-size:.78rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #e2e8f0;}
td{padding:.85rem 1rem;font-size:.88rem;border-bottom:1px solid #f1f5f9;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#fafbff;}
.pill{display:inline-block;padding:.2rem .65rem;border-radius:50px;font-size:.75rem;font-weight:600;}
.pill.pending{background:#fef3c7;color:#92400e;}
.pill.approved,.pill.confirmed{background:#d1fae5;color:#065f46;}
.pill.rejected{background:#fee2e2;color:#991b1b;}
.empty{text-align:center;padding:3rem;color:var(--muted);}
@media(max-width:768px){
  .sidebar{width:100%;min-height:auto;position:relative;border-right:none;border-bottom:1px solid rgba(139,92,246,.12);padding:.75rem 0;}
  .main-content{margin-left:0;padding:1rem;}
  .sidebar-sub{display:none;}
  .stats-grid{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>
<body>

<div class="login-page" id="loginPage">
  <div class="login-box">
    <div class="logo">ROBA<span>MO</span></div>
    <p>School Partner Portal</p>
    <div class="tabs">
      <button class="tab-btn active" id="tabLogin" onclick="switchTab('login')">Login</button>
      <button class="tab-btn" id="tabRegister" onclick="switchTab('register')">Register School</button>
    </div>
    <div id="loginForm">
      <div class="form-group"><label>School Email</label><input type="email" id="loginEmail" placeholder="school@example.com"/></div>
      <div class="form-group"><label>Password</label><input type="password" id="loginPass" placeholder="Your password"/></div>
      <button class="login-btn" onclick="doLogin()" id="loginBtn">Login →</button>
      <div id="loginMsg"></div>
    </div>
    <div id="registerForm" style="display:none;">
      <div class="form-group"><label>School Name *</label><input type="text" id="regName" placeholder="ABC Public School"/></div>
      <div class="form-group"><label>Official Email *</label><input type="email" id="regEmail" placeholder="principal@school.com"/></div>
      <div class="form-group"><label>Password *</label><input type="password" id="regPass" placeholder="Create password"/></div>
      <div class="form-group"><label>City</label><input type="text" id="regCity" placeholder="Delhi"/></div>
      <div class="form-group"><label>Phone</label><input type="tel" id="regPhone" placeholder="+91 XXXXX XXXXX"/></div>
      <button class="login-btn" onclick="doRegister()" id="registerBtn">Register School →</button>
      <div id="registerMsg"></div>
    </div>
  </div>
</div>

<div class="dashboard" id="dashboard">
  <div class="sidebar">
    <div class="sidebar-logo">ROBA<span>MO</span></div>
    <div class="sidebar-sub" id="schoolNameSub">School Panel</div>
    <div class="nav-item active" onclick="showSection('students', this)">👨‍🎓 Students</div>
    <div class="nav-item" onclick="showSection('demos', this)">📅 Demo Bookings</div>
  </div>
  <div class="main-content">
    <div class="top-bar">
      <h1 id="pageTitle">Students</h1>
      <div style="display:flex;align-items:center;gap:1rem;">
        <span class="school-badge" id="schoolBadge">🏫 School</span>
        <button class="logout-btn" onclick="doLogout()">Logout</button>
      </div>
    </div>
    <div class="section active" id="sectionStudents">
      <div class="stats-grid" id="statsGrid"></div>
      <div class="card">
        <div class="card-header">
          <span class="card-title">Enrolled Students</span>
          <input class="search-box" type="text" placeholder="Search student..." oninput="filterStudents(this.value)"/>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>#</th><th>Student Name</th><th>Email</th><th>Phone</th><th>Grade</th><th>Course</th><th>Status</th><th>Date</th></tr></thead>
            <tbody id="studentsTbody"><tr><td colspan="8" class="empty">Loading...</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
    <div class="section" id="sectionDemos">
      <div class="card">
        <div class="card-header"><span class="card-title">Demo Bookings</span></div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>#</th><th>Name</th><th>Phone</th><th>Email</th><th>Preferred Date</th><th>Status</th><th>Date</th></tr></thead>
            <tbody id="demosTbody"><tr><td colspan="7" class="empty">Loading...</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const API = 'https://robamo-v3-node22-5.onrender.com/api';
let allStudents = [];

function switchTab(tab) {
  document.getElementById('loginForm').style.display = tab === 'login' ? '' : 'none';
  document.getElementById('registerForm').style.display = tab === 'register' ? '' : 'none';
  document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
  document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
}

async function doLogin() {
  const email = document.getElementById('loginEmail').value;
  const pass = document.getElementById('loginPass').value;
  const btn = document.getElementById('loginBtn');
  const msg = document.getElementById('loginMsg');
  if (!email || !pass) { msg.innerHTML = '<p class="login-error">Email aur password required.</p>'; return; }
  btn.disabled = true; btn.textContent = 'Logging in...';
  try {
    const res = await fetch(API + '/auth/school/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pass })
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.message);
    localStorage.setItem('school_token', data.token);
    localStorage.setItem('school_info', JSON.stringify(data.school));
    showDashboard(data.school);
  } catch(err) { msg.innerHTML = `<p class="login-error">${err.message}</p>`; }
  btn.disabled = false; btn.textContent = 'Login →';
}

async function doRegister() {
  const btn = document.getElementById('registerBtn');
  const msg = document.getElementById('registerMsg');
  const body = {
    name: document.getElementById('regName').value,
    email: document.getElementById('regEmail').value,
    password: document.getElementById('regPass').value,
    city: document.getElementById('regCity').value,
    phone: document.getElementById('regPhone').value,
  };
  if (!body.name || !body.email || !body.password) { msg.innerHTML = '<p class="login-error">Name, email aur password required.</p>'; return; }
  btn.disabled = true; btn.textContent = 'Registering...';
  try {
    const res = await fetch(API + '/auth/school/register', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.message);
    msg.innerHTML = '<p class="login-success">✅ Registered! Admin approval ke baad login kar sakte hain.</p>';
  } catch(err) { msg.innerHTML = `<p class="login-error">${err.message}</p>`; }
  btn.disabled = false; btn.textContent = 'Register School →';
}

function showDashboard(school) {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('dashboard').style.display = 'flex';
  document.getElementById('schoolBadge').textContent = '🏫 ' + school.name;
  document.getElementById('schoolNameSub').textContent = school.name;
  loadStudents();
}

async function loadStudents() {
  const token = localStorage.getItem('school_token');
  try {
    const res = await fetch(API + '/school/students', { headers: { 'Authorization': 'Bearer ' + token } });
    const data = await res.json();
    allStudents = data.students || [];
    renderStudents(allStudents);
    document.getElementById('statsGrid').innerHTML = `
      <div class="stat-card"><div class="stat-icon purple">👨‍🎓</div><div><div class="stat-value">${allStudents.length}</div><div class="stat-label">Total Students</div></div></div>
      <div class="stat-card"><div class="stat-icon green">✅</div><div><div class="stat-value">${allStudents.filter(s=>s.status==='approved'||s.status==='confirmed').length}</div><div class="stat-label">Confirmed</div></div></div>
      <div class="stat-card"><div class="stat-icon amber">⏳</div><div><div class="stat-value">${allStudents.filter(s=>s.status==='pending').length}</div><div class="stat-label">Pending</div></div></div>
    `;
  } catch(err) { console.error(err); }
}

function renderStudents(list) {
  const tbody = document.getElementById('studentsTbody');
  if (!list.length) { tbody.innerHTML = '<tr><td colspan="8" class="empty">Koi student nahi mila.</td></tr>'; return; }
  tbody.innerHTML = list.map((s,i) => `
    <tr>
      <td>${i+1}</td>
      <td><strong>${s.student_name}</strong></td>
      <td>${s.email || '—'}</td>
      <td>${s.phone || '—'}</td>
      <td>${s.grade}</td>
      <td>${s.course_name || '—'}</td>
      <td><span class="pill ${s.status}">${s.status}</span></td>
      <td>${fmtDate(s.created_at)}</td>
    </tr>`).join('');
}

function filterStudents(q) {
  const filtered = allStudents.filter(s =>
    s.student_name.toLowerCase().includes(q.toLowerCase()) ||
    (s.email||'').toLowerCase().includes(q.toLowerCase()) ||
    (s.course_name||'').toLowerCase().includes(q.toLowerCase())
  );
  renderStudents(filtered);
}

async function loadDemos() {
  const token = localStorage.getItem('school_token');
  try {
    const res = await fetch(API + '/school/demos', { headers: { 'Authorization': 'Bearer ' + token } });
    const data = await res.json();
    const demos = data.demos || [];
    const tbody = document.getElementById('demosTbody');
    if (!demos.length) { tbody.innerHTML = '<tr><td colspan="7" class="empty">Koi demo booking nahi mili.</td></tr>'; return; }
    tbody.innerHTML = demos.map((d,i) => `
      <tr>
        <td>${i+1}</td>
        <td><strong>${d.name}</strong></td>
        <td>${d.phone}</td>
        <td>${d.email || '—'}</td>
        <td>${d.preferred_date || '—'}</td>
        <td><span class="pill ${d.status}">${d.status}</span></td>
        <td>${fmtDate(d.created_at)}</td>
      </tr>`).join('');
  } catch(err) { console.error(err); }
}

function showSection(name, el) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('section' + name.charAt(0).toUpperCase() + name.slice(1)).classList.add('active');
  el.classList.add('active');
  const titles = { students: 'Students', demos: 'Demo Bookings' };
  document.getElementById('pageTitle').textContent = titles[name];
  if (name === 'demos') loadDemos();
}

function doLogout() {
  localStorage.removeItem('school_token');
  localStorage.removeItem('school_info');
  location.reload();
}

function fmtDate(d) { return d ? new Date(d).toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' }) : '—'; }

window.addEventListener('DOMContentLoaded', () => {
  const token = localStorage.getItem('school_token');
  const school = localStorage.getItem('school_info');
  if (token && school) showDashboard(JSON.parse(school));
});
</script>
</body>
</html>
